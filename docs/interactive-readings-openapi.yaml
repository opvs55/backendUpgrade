openapi: 3.0.3
info:
  title: Interactive Readings API
  version: 1.1.0
  description: |
    Contract for "leitura online entre membros" including queue/matchmaking, live session,
    consensual closing, history snapshots, and external public sharing.
servers:
  - url: https://backendupgrade.onrender.com
security:
  - bearerAuth: []
tags:
  - name: Queue
  - name: Match
  - name: Sessions
  - name: History
  - name: Shares
  - name: Public
paths:
  /api/v1/readings/queue/status:
    get:
      tags: [Queue]
      summary: Get authenticated user queue status
      operationId: getQueueStatus
      responses:
        '200':
          description: Current queue status or null when not queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/readings/queue/join:
    post:
      tags: [Queue]
      summary: Join queue (idempotent)
      operationId: joinQueue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinQueueRequest'
      responses:
        '200':
          description: Queue entry (existing or new)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueJoinResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/readings/queue/leave:
    post:
      tags: [Queue]
      summary: Leave queue
      operationId: leaveQueue
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveQueueRequest'
      responses:
        '200':
          description: Queue leave confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/readings/match/accept:
    post:
      tags: [Match]
      summary: Accept a matched session invitation
      operationId: acceptMatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptMatchRequest'
      responses:
        '200':
          description: Session status after acceptance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchAcceptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/readings/sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get session state (participants only)
      operationId: getSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSnapshotResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/readings/sessions/{sessionId}/join:
    post:
      tags: [Sessions]
      summary: Mark participant as connected in session
      operationId: joinSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
      responses:
        '200':
          description: Session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSnapshotResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/readings/sessions/{sessionId}/reconnect:
    post:
      tags: [Sessions]
      summary: Reconnect participant into session
      operationId: reconnectSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
      responses:
        '200':
          description: Session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSnapshotResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/readings/sessions/{sessionId}/messages:
    get:
      tags: [Sessions]
      summary: Get paginated session messages
      operationId: listSessionMessages
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Message page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionMessagesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Sessions]
      summary: Create session message
      operationId: createSessionMessage
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/readings/sessions/{sessionId}/draw-card:
    post:
      tags: [Sessions]
      summary: Backend-authoritative card draw
      operationId: drawCard
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DrawCardRequest'
      responses:
        '201':
          description: Draw persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawCardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/readings/sessions/{sessionId}/ai-assist:
    post:
      tags: [Sessions]
      summary: Generate AI assisted suggestion for session
      operationId: aiAssistSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiAssistRequest'
      responses:
        '200':
          description: AI suggestion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAssistResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/readings/sessions/{sessionId}/end-request:
    post:
      tags: [Sessions]
      summary: Request session ending
      operationId: requestSessionEnd
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionEndRequest'
      responses:
        '200':
          description: Session close flow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/readings/sessions/{sessionId}/end-confirm:
    post:
      tags: [Sessions]
      summary: Confirm session ending (consensus required)
      operationId: confirmSessionEnd
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionEndRequest'
      responses:
        '200':
          description: Session close flow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/readings/history:
    get:
      tags: [History]
      summary: List reading history for authenticated user
      operationId: listReadingHistory
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Reading history list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingHistoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/readings/history/{sessionId}:
    get:
      tags: [History]
      summary: Get closed session history detail
      operationId: getReadingHistoryBySession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: History detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingHistoryDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/readings/history/{sessionId}/share:
    post:
      tags: [Shares]
      summary: Create share for history snapshot
      operationId: createHistoryShare
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShareRequest'
      responses:
        '200':
          description: Share created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/readings/shares/{shareId}:
    patch:
      tags: [Shares]
      summary: Update share settings
      operationId: updateShare
      parameters:
        - $ref: '#/components/parameters/ShareId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShareRequest'
      responses:
        '200':
          description: Share updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Shares]
      summary: Revoke share
      operationId: revokeShare
      parameters:
        - $ref: '#/components/parameters/ShareId'
      responses:
        '200':
          description: Share revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/public/readings/{slug}:
    get:
      tags: [Public]
      summary: Get public shared reading (sanitized, unauthenticated)
      operationId: getPublicShare
      security: []
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: Public share
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicShareResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Share inactive or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ShareId:
      name: shareId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9-]{6,80}$'
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid payload or query
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: Invalid request payload.
    Unauthorized:
      description: Missing/invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: Missing or invalid authentication token.
    Forbidden:
      description: Authenticated but not allowed for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN
            message: You do not have permission to access this resource.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: NOT_FOUND
            message: Session not found.
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CONFLICT
            message: Invalid session state transition.
    ServiceUnavailable:
      description: Upstream dependency unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: SERVICE_UNAVAILABLE
            message: AI service unavailable.
  schemas:
    WeekRef:
      type: string
      pattern: '^\d{4}-W\d{2}$'
      example: 2026-W15
    QueueMode:
      type: string
      enum: [reader, seeker, both]
    QueueStatus:
      type: string
      enum: [waiting, matched, left]
    SessionStatus:
      type: string
      enum: [matching, preparing, in_progress, awaiting_close, closed, cancelled, timeout, no_show]
    ShareVisibility:
      type: string
      enum: [private, unlisted, public]
    ShareContentLevel:
      type: string
      enum: [summary, standard, full]
    QueueItem:
      type: object
      additionalProperties: false
      required: [id, status, mode, matched_session_id, joined_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/QueueStatus'
        mode:
          $ref: '#/components/schemas/QueueMode'
        matched_session_id:
          type: string
          format: uuid
          nullable: true
        joined_at:
          type: string
          format: date-time
    JoinQueueRequest:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          $ref: '#/components/schemas/QueueMode'
    LeaveQueueRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          maxLength: 200
          example: user_cancelled
    AcceptMatchRequest:
      type: object
      additionalProperties: false
      required: [session_id, accepted]
      properties:
        session_id:
          type: string
          format: uuid
        accepted:
          type: boolean
    ReadingSession:
      type: object
      additionalProperties: false
      required:
        - id
        - code
        - status
        - reader_user_id
        - seeker_user_id
        - topic
        - allow_ai_assist
        - created_at
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          minLength: 4
          maxLength: 16
        status:
          $ref: '#/components/schemas/SessionStatus'
        reader_user_id:
          type: string
          format: uuid
        seeker_user_id:
          type: string
          format: uuid
        topic:
          type: string
        allow_ai_assist:
          type: boolean
        created_at:
          type: string
          format: date-time
    SessionParticipant:
      type: object
      additionalProperties: false
      required: [user_id, role, is_me, joined_at]
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [reader, seeker]
        is_me:
          type: boolean
        joined_at:
          type: string
          format: date-time
        end_requested_at:
          type: string
          format: date-time
          nullable: true
        end_confirmed_at:
          type: string
          format: date-time
          nullable: true
    ReadingMessage:
      type: object
      additionalProperties: false
      required: [id, kind, content, sender_user_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [text, system, ai_assist]
        content:
          type: string
          minLength: 1
        sender_user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    CardDraw:
      type: object
      additionalProperties: false
      required: [id, card_key, card_name, spread_slot, created_at]
      properties:
        id:
          type: string
          format: uuid
        card_key:
          type: string
        card_name:
          type: string
        image_url:
          type: string
          format: uri
        spread_slot:
          type: string
        is_reversed:
          type: boolean
        created_at:
          type: string
          format: date-time
    SessionSnapshot:
      type: object
      additionalProperties: false
      required: [session, participants, draws]
      properties:
        session:
          $ref: '#/components/schemas/ReadingSession'
        participants:
          type: array
          items:
            $ref: '#/components/schemas/SessionParticipant'
        draws:
          type: array
          items:
            $ref: '#/components/schemas/CardDraw'
    CreateMessageRequest:
      type: object
      additionalProperties: false
      required: [kind, content]
      properties:
        kind:
          type: string
          enum: [text]
        content:
          type: string
          minLength: 1
          maxLength: 5000
    DrawCardRequest:
      type: object
      additionalProperties: false
      required: [spread_slot, deck]
      properties:
        spread_slot:
          type: string
          minLength: 1
        deck:
          type: string
          enum: [tarot]
        is_reversed:
          type: boolean
    AiAssistRequest:
      type: object
      additionalProperties: false
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 4000
    SessionEndRequest:
      type: object
      additionalProperties: false
      properties:
        note:
          type: string
          maxLength: 1000
    ReadingShareSummary:
      type: object
      additionalProperties: false
      required: [id, slug, visibility]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        visibility:
          $ref: '#/components/schemas/ShareVisibility'
    CreateShareRequest:
      type: object
      additionalProperties: false
      required: [visibility, content_level]
      properties:
        visibility:
          $ref: '#/components/schemas/ShareVisibility'
        content_level:
          $ref: '#/components/schemas/ShareContentLevel'
    UpdateShareRequest:
      type: object
      additionalProperties: false
      properties:
        visibility:
          $ref: '#/components/schemas/ShareVisibility'
        content_level:
          $ref: '#/components/schemas/ShareContentLevel'
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
    ShareDetail:
      type: object
      additionalProperties: false
      required: [id, slug, visibility, content_level, is_active]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        visibility:
          $ref: '#/components/schemas/ShareVisibility'
        content_level:
          $ref: '#/components/schemas/ShareContentLevel'
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
    ReadingHistoryItem:
      type: object
      additionalProperties: false
      required: [id, session_id, code, status, summary, created_at, ended_at, shares]
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        code:
          type: string
        status:
          $ref: '#/components/schemas/SessionStatus'
        summary:
          type: string
        created_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        shares:
          type: array
          items:
            $ref: '#/components/schemas/ReadingShareSummary'
    PublicShare:
      type: object
      additionalProperties: false
      required: [slug, visibility, content_level, payload]
      properties:
        slug:
          type: string
        visibility:
          $ref: '#/components/schemas/ShareVisibility'
        content_level:
          $ref: '#/components/schemas/ShareContentLevel'
        payload:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, SERVICE_UNAVAILABLE]
        message:
          type: string
        details:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
    QueueStatusResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [queue]
          properties:
            queue:
              allOf:
                - $ref: '#/components/schemas/QueueItem'
              nullable: true
    QueueJoinResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [queue]
          properties:
            queue:
              $ref: '#/components/schemas/QueueItem'
    MatchAcceptResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [session]
          properties:
            session:
              type: object
              additionalProperties: false
              required: [id, status]
              properties:
                id:
                  type: string
                  format: uuid
                status:
                  $ref: '#/components/schemas/SessionStatus'
    SessionSnapshotResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SessionSnapshot'
    SessionMessagesResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [messages]
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/ReadingMessage'
    CreateMessageResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [message]
          properties:
            message:
